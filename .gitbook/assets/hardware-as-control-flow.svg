    <text x="242" y="236" font-size="12" font-weight="700" text-anchor="middle" fill="#2b4d78">GPU branch</text>
    <text x="242" y="252" font-size="10" text-anchor="middle" fill="#2b4d78">embed / infer</text>

    <path d="M140 169 C160 169 160 130 180 130" stroke="#3d7a8a" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
    <path d="M140 169 C162 169 162 185 180 185" stroke="#3d7a8a" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
