    <text x="85" y="182" font-size="11" text-anchor="middle" fill="#3d5f6e">script</text>

    <rect x="190" y="108" width="104" height="44" rx="10" fill="#eef7f9" stroke="#3d7a8a" stroke-width="2"/>
